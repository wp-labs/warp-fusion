services:
  postgres:
    image: postgres:16
    ports:
      - "55432:5432"
    environment:
      POSTGRES_USER: wfusion
      POSTGRES_PASSWORD: wfusion
      POSTGRES_DB: port_scan_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wfusion -d port_scan_db"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
