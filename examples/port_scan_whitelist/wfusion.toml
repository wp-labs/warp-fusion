mode = "batch"
sinks = "../close_demo/sinks"

[[sources]]
type = "file"
name = "seed_netflow"
path = "data/conn_events.ndjson"
stream = "netflow"
format = "ndjson"

[runtime]
executor_parallelism = 2
rule_exec_timeout = "30s"
schemas = "schemas/*.wfs"
rules   = "rules/port_scan_whitelist.wfl"

[window_defaults]
evict_interval = "30s"
max_window_bytes = "64MB"
max_total_bytes = "256MB"
evict_policy = "time_first"
watermark = "1s"
allowed_lateness = "0s"
late_policy = "drop"

[window.conn_events]
mode = "local"
max_window_bytes = "64MB"
over_cap = "30m"

[window.network_alerts]
mode = "local"
max_window_bytes = "16MB"
over_cap = "1h"


[logging]
level = "info"
format = "plain"
