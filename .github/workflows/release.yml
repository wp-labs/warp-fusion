name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-matrix:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            can-run: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            can-run: true
          - os: macos-14
            target: aarch64-apple-darwin
            can-run: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake libssl-dev

      - name: Cargo build
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ runner.os == 'macOS' && '11.0' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Show version
        if: matrix.can-run == true
        run: ./target/${{ matrix.target }}/release/wfusion --version

      - name: Package artifacts
        run: |
          set -euo pipefail
          ARTIFACT="${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p artifacts
          cp -av target/${{ matrix.target }}/release/wfusion artifacts/
          cp -av target/${{ matrix.target }}/release/wfgen artifacts/
          cp -av target/${{ matrix.target }}/release/wfl artifacts/
          cp -av target/${{ matrix.target }}/release/wfadm artifacts/
          tar -czf "${ARTIFACT}.tar.gz" artifacts

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v3
        continue-on-error: true
        with:
          subject-path: ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}
          path: ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  docker-build:
    needs: [build-matrix]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download amd64 artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          path: docker-build/amd64-tar

      - name: Download arm64 artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-${{ github.ref_name }}-aarch64-unknown-linux-gnu
          path: docker-build/arm64-tar

      - name: Extract binaries
        run: |
          set -euo pipefail
          cd docker-build
          cd amd64-tar && tar -xzf *.tar.gz && cd ..
          mkdir -p amd64
          mv amd64-tar/artifacts/* amd64/
          chmod +x amd64/*
          rm -rf amd64-tar
          cd arm64-tar && tar -xzf *.tar.gz && cd ..
          mkdir -p arm64
          mv arm64-tar/artifacts/* arm64/
          chmod +x arm64/*
          rm -rf arm64-tar
          cp ../docker/Dockerfile .
          cp -r ../docker/default_setting .

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: docker-build
          file: docker-build/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        continue-on-error: true
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  release:
    needs: [build-matrix, docker-build]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine branch
        id: branch
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" == *"-alpha"* ]]; then
            BRANCH="alpha"
          elif [[ "$VERSION" == *"-beta"* ]]; then
            BRANCH="beta"
          else
            BRANCH="main"
          fi
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "Using branch: $BRANCH"

      - name: Extract changelog
        id: changelog
        run: |
          bash scripts/extract-changelog.sh ${{ github.ref_name }}

          # Read the extracted changelogs
          CHANGELOG_ZH=$(cat /tmp/changelog-zh.md)
          CHANGELOG_EN=$(cat /tmp/changelog-en.md)

          # Save to output (escape for multiline)
          echo "changelog_zh<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_ZH" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "changelog_en<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_EN" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download Artifact
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: warp-fusion-*
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          fail_on_unmatched_files: true
          body: |
            # Warp Fusion ${{ github.ref_name }}

            ${{ steps.changelog.outputs.changelog_en }}

            ---

            <details>
            <summary>中文版 Changelog / Chinese Version</summary>

            ${{ steps.changelog.outputs.changelog_zh }}

            </details>

            ---

            ## 📦 Installation

            ### Binary Downloads
            Download the pre-built binaries for your platform from the assets below.

            ### Quick Install Script
            ```bash
            curl -sSf https://get.warpparse.ai/inst-x.sh | bash -s -- wfusion ${{ steps.branch.outputs.branch }}
            ```

            ### Docker Image
            Pull and run the Docker image:
            ```shell
            # Pull the specific version
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}

            # Or pull the latest version
            docker pull ghcr.io/${{ github.repository }}:latest

            # Run the container
            docker run --rm ghcr.io/${{ github.repository }}:${{ github.ref_name }} wfusion --help
            ```

            ## 🔐 Verification

            All artifacts are signed with this repo's identity using Sigstore.
            You can verify the signatures using the GitHub CLI:

            ```shell
            gh attestation verify --owner ${{ github.repository_owner }} <artifact-file>
            ```

            ## 📚 Documentation

            - [Getting Started](https://github.com/wp-labs/warp-fusion/blob/${{ steps.branch.outputs.branch }}/docs/getting-started.md)
            - [CLI Reference](https://github.com/wp-labs/warp-fusion/blob/${{ steps.branch.outputs.branch }}/docs/cli.md)
            - [Configuration](https://github.com/wp-labs/warp-fusion/blob/${{ steps.branch.outputs.branch }}/docs/configuration.md)

            ## 🐛 Found an Issue?

            Please report it at: https://github.com/wp-labs/warp-fusion/issues

          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, 'alpha-') || contains(github.ref_name, '-beta') || contains(github.ref_name, 'beta-') || contains(github.ref_name, '-pre') || contains(github.ref_name, 'pre-') }}
          files: artifacts/*

  update-local-manifest:
    needs: [release]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    concurrency:
      group: warp-fusion-updates
      cancel-in-progress: false
    steps:
      - name: Determine channel
        id: meta
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ "$VERSION" == *"-alpha"* || "$VERSION" == *"alpha-"* ]]; then
            CHANNEL="alpha"
          elif [[ "$VERSION" == *"-beta"* || "$VERSION" == *"beta-"* || "$VERSION" == *"-pre"* || "$VERSION" == *"pre-"* ]]; then
            CHANNEL="beta"
          else
            CHANNEL="stable"
            BRANCH="main"
          fi
          if [[ "$CHANNEL" == "alpha" ]]; then
            BRANCH="alpha"
          elif [[ "$CHANNEL" == "beta" ]]; then
            BRANCH="beta"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Fetch release metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${{ steps.meta.outputs.tag }}" > /tmp/release.json

      - name: Build assets map and validate
        run: |
          set -euo pipefail
          jq -c '
            [ .assets[]
              | select(.name | test("^warp-fusion-v[^/]+-(aarch64-apple-darwin|aarch64-unknown-linux-gnu|x86_64-unknown-linux-gnu)\\.tar\\.gz$"))
              | {
                  key: (.name | capture("-(?<target>aarch64-apple-darwin|aarch64-unknown-linux-gnu|x86_64-unknown-linux-gnu)\\.tar\\.gz$").target),
                  value: {
                    url: .browser_download_url,
                    sha256: ((.digest // "") | sub("^sha256:"; "") | ascii_downcase)
                  }
                }
            ] | from_entries
          ' /tmp/release.json > /tmp/assets.json

          jq -e '
            (keys | sort) == ["aarch64-apple-darwin","aarch64-unknown-linux-gnu","x86_64-unknown-linux-gnu"] and
            (to_entries | all(.value.url | startswith("https://github.com/wp-labs/warp-fusion/releases/download/")))
          ' /tmp/assets.json >/dev/null

      - name: Checkout update branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.meta.outputs.branch }}
          path: repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifest and history
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${{ steps.meta.outputs.version }}"
          CHANNEL="${{ steps.meta.outputs.channel }}"
          PUBLISHED_AT="$(jq -r '.published_at // empty' /tmp/release.json)"
          if [[ -z "$PUBLISHED_AT" ]]; then
            PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi

          cd repo
          MANIFEST="updates/${CHANNEL}/manifest.json"
          HISTORY="updates/${CHANNEL}/versions/${TAG}.json"
          mkdir -p "$(dirname "$MANIFEST")" "$(dirname "$HISTORY")"

          # Read assets and compute sha256 if not provided by GitHub
          ASSETS_FILE="/tmp/assets.json"

          # If sha256 is empty, download and compute
          if jq -e 'to_entries | all(.value.sha256 != "")' "$ASSETS_FILE" >/dev/null; then
            echo "All assets have sha256 from release metadata"
          else
            echo "Computing sha256 for assets..."
            NEW_ASSETS='{}'
            for entry in $(jq -c 'to_entries[]' "$ASSETS_FILE"); do
              target=$(echo "$entry" | jq -r '.key')
              url=$(echo "$entry" | jq -r '.value.url')
              sha256=$(curl -sL "$url" | sha256sum | awk '{print $1}')
              NEW_ASSETS="$(echo "$NEW_ASSETS" | jq -c --arg target "$target" --arg url "$url" --arg sha "$sha256" '. + {($target): {url: $url, sha256: $sha}}')"
            done
            echo "$NEW_ASSETS" > "$ASSETS_FILE"
          fi

          jq -e '
            to_entries | all(.value.sha256 | test("^[0-9a-f]{64}$"))
          ' "$ASSETS_FILE" >/dev/null

          jq -n \
            --arg version "$VERSION" \
            --arg channel "$CHANNEL" \
            --arg published_at "$PUBLISHED_AT" \
            --arg git_ref "$TAG" \
            --arg git_commit "${GITHUB_SHA}" \
            --slurpfile assets "$ASSETS_FILE" \
            '{
              version: $version,
              channel: $channel,
              published_at: $published_at,
              git_ref: $git_ref,
              git_commit: $git_commit,
              assets: $assets[0]
            }' > "$MANIFEST"

          cp "$MANIFEST" "$HISTORY"

          echo "Generated manifest:"
          cat "$MANIFEST"

      - name: Commit and push manifest
        run: |
          set -euo pipefail
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add updates
          if git diff --cached --quiet; then
            echo "no manifest changes"
            exit 0
          fi
          git commit -m "chore(updates): ${{ steps.meta.outputs.tag }} (${{ steps.meta.outputs.channel }})"
          git push
