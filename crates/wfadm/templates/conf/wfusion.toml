# wf-rules 内置 wfusion 配置 — 可直接运行完整管道
# mode 由 CLI 控制: wfusion daemon | wfusion batch

sources_dir = "topology/sources"
sinks = "topology/sinks"

[runtime]
executor_parallelism = 4
rule_exec_timeout = "30s"
schemas = "models/schemas/*.wfs"
rules = "models/rules/*/*.wfl"

[window_defaults]
evict_interval = "30s"
max_window_bytes = "256MB"
max_total_bytes = "2GB"
evict_policy = "time_first"
watermark = "5s"
allowed_lateness = "30m"
late_policy = "drop"

# conn_events
[window.conn_events]
mode = "local"
max_window_bytes = "256MB"
over_cap = "30m"

# auth_events
[window.auth_events]
mode = "local"
max_window_bytes = "128MB"
over_cap = "10m"

# http_events
[window.http_events]
mode = "local"
max_window_bytes = "128MB"
over_cap = "5m"

# dns_events
[window.dns_events]
mode = "local"
max_window_bytes = "64MB"
over_cap = "10m"

# 告警窗口（over=0）
[window.network_alerts]
mode = "local"
max_window_bytes = "16MB"
over_cap = "0s"

[window.security_alerts]
mode = "local"
max_window_bytes = "16MB"
over_cap = "0s"

[window.http_alerts]
mode = "local"
max_window_bytes = "16MB"
over_cap = "0s"

[window.dns_alerts]
mode = "local"
max_window_bytes = "16MB"
over_cap = "0s"

[window.management_alerts]
mode = "local"
max_window_bytes = "16MB"
over_cap = "0s"

[window.insider_alerts]
mode = "local"
max_window_bytes = "16MB"
over_cap = "0s"

# management.wfs — data windows
[window.ad_change_events]
mode = "local"
max_window_bytes = "64MB"
over_cap = "30m"

[window.process_events]
mode = "local"
max_window_bytes = "64MB"
over_cap = "10m"

# data.wfs — data windows
[window.data_access_events]
mode = "local"
max_window_bytes = "64MB"
over_cap = "10m"

# Admin API — runtime status & (future) reload. `wfadm init` generates a
# bearer token at ${HOME}/.warp_fusion/admin_api.token (owner-only, shared
# across projects); ${HOME} is expanded by wf-config at load time.
# Only the fields you want to override need to be set — the rest
# (request_timeout_ms, max_body_bytes, tls, auth.mode) use sane defaults.
[admin_api]
enabled = true
bind = "127.0.0.1:19080"

[admin_api.auth]
token_file = "${HOME}/.warp_fusion/admin_api.token"

[admin_api.tls]
# TLS is disabled by default. Uncomment `enabled = true` and provide
# cert_file / key_file paths to enable HTTPS on the admin API.
enabled = false
# cert_file = "path/to/cert.pem"
# key_file = "path/to/key.pem"

[logging]
level = "debug"
format = "plain"
file = "data/wfusion.log"
