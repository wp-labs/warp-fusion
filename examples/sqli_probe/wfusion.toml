mode = "batch"
sinks = "sinks"

[[sources]]
type = "file"
key = "http_source"

[sources.params]
path = "data/http_events.ndjson"
stream = "http"
format = "ndjson"


[runtime]
executor_parallelism = 2
rule_exec_timeout = "30s"
schemas = "schemas/*.wfs"
rules   = "rules/sqli_probe.wfl"

[window_defaults]
evict_interval = "30s"
max_window_bytes = "64MB"
max_total_bytes = "256MB"
evict_policy = "time_first"
watermark = "1s"
allowed_lateness = "0s"
late_policy = "drop"

[window.http_events]
mode = "local"
max_window_bytes = "64MB"
over_cap = "30m"

[window.security_alerts]
mode = "local"
max_window_bytes = "1MB"
over_cap = "0s"

[logging]
level = "info"
format = "plain"
