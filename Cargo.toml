[workspace]
members = [".", "crates/wfgen", "crates/wfl"]
resolver = "2"

[workspace.package]
edition = "2024"
license = "Apache-2.0"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
winnow = "0.7"
orion-error = { version = "0.8.1", features = ["derive", "serde_json", "toml", "tracing"] }
wf-engine = { path = "../wp-reactor/crates/wf-engine" }
wf-config = { path = "../wp-reactor/crates/wf-config" }
wf-lang = { path = "../wp-reactor/crates/wf-lang" }
wf-runtime = { path = "../wp-reactor/crates/wf-runtime" }

[package]
name = "warp-fusion"
version = "0.1.2" #@gxl:set(version)
edition.workspace = true
license.workspace = true

[[bin]]
name = "wfusion"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal"] }
wf-runtime.workspace = true

[dev-dependencies]
tempfile = "3"
