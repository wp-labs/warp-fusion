version = 2

[cache]
enabled = true
capacity = 1024
ttl_ms = 300000

[provider]
kind = "postgres"
connection_uri = "postgres://wfusion:wfusion@127.0.0.1:55432/port_scan_db"
pool_size = 4

[[tables]]
name = "scanner_whitelist"
dir = "whitelist"
enabled = true
columns.by_header = ["sip", "note"]

[[tables]]
name = "internal_ips"
dir = "internal_ips"
enabled = true
columns.by_header = ["ip", "department", "owner", "segment"]
