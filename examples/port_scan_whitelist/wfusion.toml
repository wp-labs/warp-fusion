mode = "batch"
sinks = "topology/sinks"

[[sources]]
type = "file"
key = "seed_netflow"

[sources.params]
path = "data/conn_events.ndjson"
stream = "netflow"
format = "ndjson"
[runtime]
executor_parallelism = 2
rule_exec_timeout = "30s"
schemas = "schemas/*.wfs"
rules   = "rules/port_scan_whitelist.wfl"
[window_defaults]
evict_interval = "30s"
max_window_bytes = "64MB"
max_total_bytes = "256MB"
evict_policy = "time_first"
watermark = "1s"
allowed_lateness = "0s"
late_policy = "drop"
[window.conn_events]
mode = "local"
max_window_bytes = "64MB"
over_cap = "30m"
[window.network_alerts]
mode = "local"
max_window_bytes = "16MB"
over_cap = "1h"
# Provider 窗口：table 指向 knowdb.toml 中的表
[window.scanner_whitelist]
mode = "local"
max_window_bytes = "1MB"
over_cap = "0s"
table = "scanner_whitelist"
[window.internal_ips]
mode = "local"
max_window_bytes = "1MB"
over_cap = "0s"
table = "internal_ips"
[logging]
level = "info"
format = "plain"
