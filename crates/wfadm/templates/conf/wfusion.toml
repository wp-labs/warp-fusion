# wf-rules 内置 wfusion 配置 — 可直接运行完整管道
# mode 由 CLI 控制: wfusion daemon | wfusion batch

sources_dir = "topology/sources"
sinks = "topology/sinks"
windows = "models/windows.toml"

[runtime]
executor_parallelism = 4
rule_exec_timeout = "30s"
schemas = "models/schemas/*.wfs"
rules = "models/rules/*/*.wfl"

# Admin API — runtime status & (future) reload. `wfadm init` generates a
# bearer token at ${HOME}/.warp_fusion/admin_api.token (owner-only, shared
# across projects); ${HOME} is expanded by wf-config at load time.
# Only the fields you want to override need to be set — the rest
# (request_timeout_ms, max_body_bytes, tls, auth.mode) use sane defaults.
[admin_api]
enabled = true
bind = "127.0.0.1:19080"

[admin_api.auth]
token_file = "${HOME}/.warp_fusion/admin_api.token"

[logging]
level = "debug"
format = "plain"
file = "data/wfusion.log"
