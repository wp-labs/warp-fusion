mode = "batch"
sources_dir = "topology/sources"
sinks = "topology/sinks"

[runtime]
executor_parallelism = 2
rule_exec_timeout = "30s"
schemas = "schemas/*.wfs"
rules   = "rules/ssh_brute_force.wfl"
[window_defaults]
evict_interval = "30s"
max_window_bytes = "64MB"
max_total_bytes = "256MB"
evict_policy = "time_first"
watermark = "1s"
allowed_lateness = "0s"
late_policy = "drop"
[window.auth_events]
mode = "local"
max_window_bytes = "64MB"
over_cap = "30m"
[window.security_alerts]
mode = "local"
max_window_bytes = "1MB"
over_cap = "0s"
[window.scanner_whitelist]
mode = "local"
max_window_bytes = "1MB"
over_cap = "0s"
table = "scanner_whitelist"
[logging]
level = "info"
format = "plain"
