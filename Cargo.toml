[workspace]
members = [".", "crates/wfgen", "crates/wfl"]
resolver = "2"

[workspace.package]
edition = "2024"
license = "Apache-2.0"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
anyhow = "1.0"
winnow = "0.7"

[package]
name = "warp-fusion"
version = "0.1.1" #@gxl:set(version)
edition.workspace = true
license.workspace = true

[[bin]]
name = "wfusion"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal"] }
wf-engine = { path = "../wp-reactor/crates/wf-engine" }

[dev-dependencies]
tempfile = "3"
